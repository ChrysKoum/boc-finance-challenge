services:
  finance-api:
    build:
      context: ./python-api
    expose:
      - "8000"
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - finance-api
      - frontend
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  csharp-client:
    build:
      context: ./csharp-client
    environment:
      FINANCE_API_URL: http://finance-api:8000
    depends_on:
      - finance-api
    profiles:
      - tools

  java-processor:
    build:
      context: ./java-processor
    profiles:
      - tools

volumes:
  caddy_data:
  caddy_config:
